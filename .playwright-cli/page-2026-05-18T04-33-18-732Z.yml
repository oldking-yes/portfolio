              - generic [ref=e109]:
                - paragraph [ref=e110]: 请在提交表单前务必确认以下事项，否则可能导致权益无法到账：
                - list [ref=e111]:
                  - listitem [ref=e112]: 已有开放平台账号？
                - paragraph [ref=e113]:
                  - text: 请确保它已由你在表单中填写的邮箱注册，如果它由手机号注册的，请绑定该邮箱。不知道如何绑定邮箱？
                  - link "前往绑定" [ref=e114] [cursor=pointer]:
                    - /url: https://account.xiaomi.com/fe/service/account?cUserId=U7hAD568P7JQV_47Vm26QRobBkQ&userId=2361251226&_locale=zh_CN
