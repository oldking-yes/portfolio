            - generic [ref=e84]:
              - heading "01 什么是 Xiaomi MiMo Orbit 百万亿 Token 创造者激励计划？" [level=3] [ref=e85]
              - generic [ref=e86]:
                - paragraph [ref=e87]: Xiaomi MiMo Orbit 百万亿 Token 创造者激励计划是 Xiaomi MiMo 面向全球高质量、AI 驱动的用户的限时 Token 定向发放活动。我们计划在 30 天内发放总计 100 万亿 Token 权益，完全免费。每一份申请都会经过仔细评估，我们希望将资源交到真正用 AI 进行创造的用户手中。
                - paragraph [ref=e88]:
                  - link "Xiaomi MiMo" [ref=e89] [cursor=pointer]:
                    - /url: https://mimo.xiaomi.com/
                  - text: 是小米自研的大模型，V2.5 是我们的最新系列，包含旗舰推理模型、多模态模型和语音合成模型，全面覆盖文本、图像、语音等场景。
                - paragraph [ref=e90]:
                  - link "MiMo API 开放平台" [ref=e91] [cursor=pointer]:
                    - /url: http://platform.xiaomimimo.com
                  - text: 面向全球用户提供 API 推理服务，可直接对接 Claude Code、Cursor、OpenClaw 等主流编程工具。
          - article [ref=e92]:
            - generic [ref=e93]:
              - heading "02 活动时间和参与资格？" [level=3] [ref=e94]
              - paragraph [ref=e95]: 北京时间 2026 年 4 月 28 日 00:00 至 5 月 28 日 00:00（UTC 2026 年 4 月 27 日 16:00 至 5 月 27 日 16:00），共 30 天，赠完即止。面向全球所有用户开放，个人开发者、团队、企业均可参与。
          - article [ref=e96]:
