                  - link "Token Plan" [ref=e124] [cursor=pointer]:
                    - /url: https://platform.xiaomimimo.com/token-plan
                  - text: 是开放平台的订阅制套餐，可直接配置到 Claude Code、Cursor 等编程工具中使用 MiMo 系列模型；赠金将直接充入你的开放平台账户余额，用于按量计费的 API 调用消费。
                - paragraph [ref=e125]: 具体权益以到账为准。
          - article [ref=e126]:
            - generic [ref=e127]:
              - heading "06 评估标准是什么？" [level=3] [ref=e128]
              - generic [ref=e129]:
                - paragraph [ref=e130]: 我们会根据你提交的表单内容进行综合评估，包括你使用的 AI 工具、底层模型、项目描述和证明材料。填写越详细、项目越具体，评估通过率和权益档位越高。
                - paragraph [ref=e131]: 评估通过后，系统会通过邮件通知你。如果 3 天内没有收到评估通过的邮件，你可以试着重新提交这份表单。
          - article [ref=e132]:
            - generic [ref=e133]:
              - heading "07 权益有有效期吗？" [level=3] [ref=e134]
              - paragraph [ref=e135]: 有。不同权益的有效期以到账提示为准，过期未使用的权益将自动失效，请及时使用和体验。
          - article [ref=e136]:
