              - heading "03 如何加入该项目？" [level=3] [ref=e98]
              - list [ref=e100]:
                - listitem [ref=e101]: 在本页面点击「立即申请」，填写并提交表单
                - listitem [ref=e102]: 等待评估（约 3 个工作日）
                - listitem [ref=e103]: 评估通过后，你会收到一封通知邮件
                - listitem [ref=e104]:
                  - text: 使用你填写的邮箱登录或注册
                  - link "Xiaomi MiMo API 开放平台" [ref=e105] [cursor=pointer]:
