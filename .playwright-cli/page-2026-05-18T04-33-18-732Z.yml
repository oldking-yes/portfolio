                - paragraph [ref=e117]: 请在收到评估通过的邮件后，根据邮件的提示，使用你填写的邮箱完成账号注册。
          - article [ref=e118]:
            - generic [ref=e119]:
              - heading "05 我会获得什么权益？" [level=3] [ref=e120]
              - generic [ref=e121]:
                - paragraph [ref=e122]: 我们会根据你表单填写的内容以及你的开放平台账号状态，发放不同额度、不同档位的 Token Plan，或不同金额的赠金，完全免费。
